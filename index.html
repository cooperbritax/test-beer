<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeerTracker iOS</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#111111" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BeerTracker" />
<link rel="apple-touch-icon" href="assets/images/icon-192.png" />
</head>
<body>
<div class="container">
<header>BeerTracker</header>

<label for="beerSelect">Choisir la bière :</label>
<select id="beerSelect"></select>
<p id="kegDate">Date de mise en service : --/--/----</p>

<h2 id="beerName">Nom de la bière</h2>
<img id="kegImage" src="" alt="Fût de bière">

<div class="gauge">
<div class="bubble-layer" id="bubbleLayer"></div>
<svg viewBox="0 0 220 220">
  <defs>
    <linearGradient id="beerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd54a"/>
      <stop offset="100%" stop-color="#d99a00"/>
    </linearGradient>
  </defs>
  <circle class="circle-bg" cx="110" cy="110" r="100" stroke="#3a3a3a"/>
  <circle class="circle" cx="110" cy="110" r="100" stroke="url(#beerGradient)"/>
</svg>
<div class="gauge-text">
  <h1 id="percent">100%</h1>
  <p id="volume">5.0 L / 5.0 L</p>
    <p id="glassCount" style="margin:8px 0 0; font-weight:700; color:#2c3e50;"></p>
</div>
</div>

<div class="button-row">
  <button class="blue" id="btn25" type="button">25 cL</button>
  <button class="green" id="btn33" type="button">33 cL</button>
  <button class="orange" id="btn50" type="button">50 cL</button>
</div>

<div class="bottom-row">
  <button id="btnUndo" type="button">Annuler dernier</button>
  <button id="btnCustom" type="button">+ Verre Perso</button>
</div>

<div class="bottom-row">
  <button id="btnHistory" type="button">📊 Historique des fûts</button>
</div>

<div id="lowBeerWarning" class="low-beer-warning" hidden>⚠️ Il reste moins de 1 litre dans le fût</div>

<div class="history" id="history"></div>
</div>


<!-- Modal récap fin de fût -->
<div class="modal-backdrop" id="kegSummaryBackdrop" aria-hidden="true"></div>
<div class="modal" id="kegSummaryModal" role="dialog" aria-modal="true" aria-labelledby="kegSummaryTitle" aria-hidden="true">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-icon" aria-hidden="true">🍺</div>
      <div class="modal-titles">
        <div class="modal-title" id="kegSummaryTitle">Fût terminé</div>
        <div class="modal-subtitle" id="kegSummaryBeer">—</div>
      </div>
      <button class="modal-close" id="kegSummaryClose" type="button" aria-label="Fermer">✕</button>
    </div>

    <div class="modal-body">
      <div class="modal-stat">
        <div class="stat-label">Verres servis</div>
        <div class="stat-value" id="kegSummaryGlasses">—</div>
      </div>

      <div class="modal-stat">
        <div class="stat-label">Détail</div>
        <div class="stat-value small" id="kegSummaryDetail">—</div>
      </div>

      <div class="modal-stat">
        <div class="stat-label">Durée</div>
        <div class="stat-value" id="kegSummaryDuration">—</div>
        <div class="stat-note" id="kegSummaryDates">—</div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="modal-btn" id="kegSummaryOk" type="button">OK</button>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="kegHistoryBackdrop" aria-hidden="true"></div>
<div class="modal" id="kegHistoryModal" role="dialog" aria-modal="true" aria-labelledby="kegHistoryTitle" aria-hidden="true">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-icon" aria-hidden="true">📊</div>
      <div class="modal-titles">
        <div class="modal-title" id="kegHistoryTitle">Historique des fûts</div>
        <div class="modal-subtitle">Résumé des fûts terminés</div>
      </div>
      <button class="modal-close" id="kegHistoryClose" type="button" aria-label="Fermer">✕</button>
    </div>
    <div class="modal-body">
      <div id="kegHistoryList" class="history"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn" id="kegHistoryOk" type="button">OK</button>
    </div>
  </div>
</div>
<div class="app-copyright">
© <span id="copyrightYear"></span> BeerTracker — All rights reserved
</div>


<script type="module" src="assets/js/app.js"></script>
</body>
</html>
